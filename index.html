<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A polished two-player Tic-Tac-Toe game with live status, score tracking, and accessible controls.">
    <title>Tic-Tac-Toe | Asrumochan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow glow-a" aria-hidden="true"></div>
    <div class="background-glow glow-b" aria-hidden="true"></div>

    <main class="app-shell">
        <header class="hero">
            <p class="eyebrow">Asru Studio</p>
            <h1>Tic-Tac-Toe</h1>
            <p class="subtitle">A clean, competitive two-player board with instant feedback and scorekeeping.</p>
        </header>

        <section class="setup-panel" aria-label="Player setup">
            <div class="field-group">
                <label for="player1">Player X</label>
                <input id="player1" type="text" maxlength="24" placeholder="Enter name" autocomplete="name">
            </div>
            <div class="field-group">
                <label for="player2">Player O</label>
                <input id="player2" type="text" maxlength="24" placeholder="Enter name" autocomplete="name">
            </div>
            <button id="applyNames" class="btn btn-primary" type="button">Apply Names</button>
        </section>

        <section class="status-panel" aria-live="polite">
            <p id="status" class="status">Enter names and start playing.</p>
            <div class="turn-indicator">
                <span>Current Turn</span>
                <strong id="turnBadge">X</strong>
            </div>
        </section>

        <section class="score-panel" aria-label="Scoreboard">
            <article class="score-card score-x">
                <h2 id="p1Label">Player X</h2>
                <p><span class="mono">X</span> Wins: <strong id="p1Score">0</strong></p>
            </article>
            <article class="score-card score-o">
                <h2 id="p2Label">Player O</h2>
                <p><span class="mono">O</span> Wins: <strong id="p2Score">0</strong></p>
            </article>
            <article class="score-card score-draw">
                <h2>Draws</h2>
                <p>Total: <strong id="drawScore">0</strong></p>
            </article>
        </section>

        <section class="board-wrap" aria-label="Game board">
            <div class="game" id="gameBoard" role="grid" aria-label="Tic-Tac-Toe board">
                <button class="box" data-index="0" role="gridcell" aria-label="Cell 1"></button>
                <button class="box" data-index="1" role="gridcell" aria-label="Cell 2"></button>
                <button class="box" data-index="2" role="gridcell" aria-label="Cell 3"></button>
                <button class="box" data-index="3" role="gridcell" aria-label="Cell 4"></button>
                <button class="box" data-index="4" role="gridcell" aria-label="Cell 5"></button>
                <button class="box" data-index="5" role="gridcell" aria-label="Cell 6"></button>
                <button class="box" data-index="6" role="gridcell" aria-label="Cell 7"></button>
                <button class="box" data-index="7" role="gridcell" aria-label="Cell 8"></button>
                <button class="box" data-index="8" role="gridcell" aria-label="Cell 9"></button>
            </div>
        </section>

        <div class="actions">
            <button id="newRound" class="btn btn-primary" type="button">New Round</button>
            <button id="resetAll" class="btn btn-ghost" type="button">Reset Scoreboard</button>
        </div>
    </main>

    <script src="./main.js"></script>
</body>
</html>
